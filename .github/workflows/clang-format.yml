name: ClangFormat

on: pull_request

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt install clang-format

      - name: Fetch target branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Run clang-format
        run: |
          git clang-format --diff --verbose --extensions 'cc,cpp,h,c' FETCH_HEAD | tee clang-format.out
          if grep -q -F 'diff --git' clang-format.out; then exit 1; fi
